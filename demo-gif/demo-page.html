<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentDoom Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: white;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .logo { text-align: center; margin-bottom: 2rem; }
  .logo h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo .accent { color: #7c3aed; }
  .logo p { color: #9ca3af; font-size: 0.95rem; margin-top: 0.5rem; }

  .input-area {
    width: 100%;
    max-width: 640px;
    border: 1px solid #1f2937;
    border-radius: 1rem;
    background: #111111;
    padding: 0.25rem;
    transition: border-color 0.3s;
  }
  .input-area.focused { border-color: rgba(124, 58, 237, 0.5); }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 1.05rem;
    padding: 0.75rem 1rem;
    resize: none;
    line-height: 1.5;
  }
  textarea::placeholder { color: #6b7280; }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0.75rem 0.5rem;
  }
  .char-count { font-size: 0.75rem; color: #4b5563; }

  .btn-generate {
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 0.75rem;
    padding: 0.5rem 1.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-generate:hover { background: #6d28d9; }
  .btn-generate.building { opacity: 0.7; }

  .output-area {
    width: 100%;
    max-width: 640px;
    margin-top: 1.5rem;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
  }
  .output-area.visible { opacity: 1; transform: translateY(0); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #7c3aed;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .status-dot.done { background: #10b981; animation: none; }
  .status-text { font-size: 0.875rem; color: #9ca3af; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stream-box {
    border: 1px solid #1f2937;
    border-radius: 0.75rem;
    background: #111111;
    padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    max-height: 16rem;
    overflow: auto;
  }
  .stream-line {
    color: #d1d5db;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
  }
  .stream-line .arrow { color: #a78bfa; margin-right: 0.5rem; }

  @keyframes fadeIn { to { opacity: 1; } }

  .preview-container {
    margin-top: 1rem;
    border: 1px solid #1f2937;
    border-radius: 0.75rem;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .preview-container.visible { opacity: 1; transform: translateY(0); }

  .preview-titlebar {
    background: #1a1a1a;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: rgba(239,68,68,0.6); }
  .dot.yellow { background: rgba(234,179,8,0.6); }
  .dot.green { background: rgba(16,185,129,0.6); }
  .preview-label { font-size: 0.75rem; color: #6b7280; margin-left: 0.5rem; }

  .preview-iframe {
    width: 100%;
    height: 360px;
    border: none;
    background: white;
  }

  .actions {
    margin-top: 1rem;
    display: flex;
    gap: 0.75rem;
    opacity: 0;
    transition: all 0.4s ease;
  }
  .actions.visible { opacity: 1; }

  .btn-deploy {
    background: #10b981;
    color: white;
    border: none;
    border-radius: 0.75rem;
    padding: 0.75rem 2rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-another {
    background: transparent;
    color: #d1d5db;
    border: 1px solid #374151;
    border-radius: 0.75rem;
    padding: 0.75rem 2rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
  }

  .footer {
    position: fixed;
    bottom: 1rem;
    font-size: 0.75rem;
    color: #4b5563;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(124,58,237,0.2); }
    50% { box-shadow: 0 0 20px rgba(124,58,237,0.4); }
  }
  .stream-box.glowing { animation: glowPulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="logo">
  <h1><span class="accent">Agent</span>Doom</h1>
  <p>Describe any tool. Watch it build itself. Deploy in seconds.</p>
</div>

<div class="input-area" id="inputArea">
  <textarea id="promptInput" rows="3" placeholder="A tip calculator that splits the bill between friends..."></textarea>
  <div class="input-footer">
    <span class="char-count" id="charCount">Press Enter to generate</span>
    <button class="btn-generate" id="generateBtn">Generate</button>
  </div>
</div>

<div class="output-area" id="outputArea">
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText"></span>
  </div>
  <div class="stream-box" id="streamBox"></div>

  <div class="preview-container" id="previewContainer">
    <div class="preview-titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="preview-label">Preview</span>
    </div>
    <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts allow-forms"></iframe>
  </div>

  <div class="actions" id="actions">
    <button class="btn-deploy">View Live Tool</button>
    <button class="btn-another">Build Another</button>
  </div>
</div>

<div class="footer">Built with AgentDoom</div>

<script>
// Simulated demo flow - auto-triggered after page load
const PROMPT_TEXT = "build me a pomodoro timer with dark mode";

const STREAM_LINES = [
  { stage: 'classifying', lines: [
    'Analyzing prompt intent...',
    'Category detected: productivity/timer',
    'Complexity: medium | Components: 3',
  ]},
  { stage: 'generating', lines: [
    'Selecting primitives: Timer, Controls, ThemeProvider',
    'Generating component tree...',
    'Applying dark mode theme tokens',
    'Wiring state: workDuration=25m, breakDuration=5m',
  ]},
  { stage: 'assembling', lines: [
    'Assembling HTML + CSS + JS bundle',
    'Injecting responsive viewport meta',
    'Bundle size: 4.2 KB (optimized)',
  ]},
  { stage: 'deploying', lines: [
    'Deploying to edge network...',
    'Live at: agentdoom.ai/t/pomodoro-dark-7x2k',
  ]},
];

const STATUS_MESSAGES = {
  classifying: 'Understanding your intent...',
  generating: 'Building your tool...',
  assembling: 'Assembling components...',
  deploying: 'Deploying to the edge...',
  done: 'Your tool is live!',
};

const POMODORO_HTML = `<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #e94560; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
  .timer-display {
    font-size: 5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
    text-shadow: 0 0 30px rgba(233,69,96,0.3);
    margin-bottom: 0.5rem;
  }
  .mode-label {
    font-size: 0.9rem;
    color: #e94560;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
  }
  .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .btn {
    padding: 0.7rem 2rem;
    border-radius: 0.5rem;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start { background: #e94560; color: white; }
  .btn-start:hover { background: #c23152; }
  .btn-reset { background: #16213e; color: #aaa; border: 1px solid #333; }
  .btn-reset:hover { border-color: #555; }
  .sessions {
    display: flex; gap: 0.5rem;
  }
  .session-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #16213e;
    border: 1px solid #333;
  }
  .session-dot.completed { background: #e94560; border-color: #e94560; }
</style>
</head>
<body>
  <h1>Pomodoro Timer</h1>
  <p class="subtitle">Stay focused, take breaks</p>
  <div class="timer-display">25:00</div>
  <div class="mode-label">Work Session</div>
  <div class="controls">
    <button class="btn btn-start">Start</button>
    <button class="btn btn-reset">Reset</button>
  </div>
  <div class="sessions">
    <div class="session-dot completed"></div>
    <div class="session-dot completed"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
  </div>
</body>
</html>`;

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(el, text, speed = 55) {
  for (const char of text) {
    el.value += char;
    charCount.textContent = `${el.value.length} chars`;
    await sleep(speed);
  }
}

async function addStreamLine(text) {
  const line = document.createElement('div');
  line.className = 'stream-line';
  line.innerHTML = `<span class="arrow">></span>${text}`;
  streamBox.appendChild(line);
  streamBox.scrollTop = streamBox.scrollHeight;
  await sleep(100);
}

async function runDemo() {
  const promptInput = document.getElementById('promptInput');
  const inputArea = document.getElementById('inputArea');
  const charCount = document.getElementById('charCount');
  const generateBtn = document.getElementById('generateBtn');
  const outputArea = document.getElementById('outputArea');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const streamBox = document.getElementById('streamBox');
  const previewContainer = document.getElementById('previewContainer');
  const previewFrame = document.getElementById('previewFrame');
  const actions = document.getElementById('actions');

  // Phase 1: Type prompt
  await sleep(800);
  inputArea.classList.add('focused');
  await sleep(300);
  await typeText(promptInput, PROMPT_TEXT, 45);
  await sleep(600);

  // Phase 2: Click generate
  generateBtn.classList.add('building');
  generateBtn.textContent = 'Building...';
  promptInput.disabled = true;
  await sleep(400);

  // Phase 3: Show output area
  outputArea.classList.add('visible');
  streamBox.classList.add('glowing');

  // Phase 4: Stream stages
  for (const stage of STREAM_LINES) {
    statusText.textContent = STATUS_MESSAGES[stage.stage];
    for (const line of stage.lines) {
      await addStreamLine(line);
      await sleep(350);
    }
    await sleep(200);
  }

  // Phase 5: Show preview
  streamBox.classList.remove('glowing');
  previewContainer.classList.add('visible');
  previewFrame.srcdoc = POMODORO_HTML;
  await sleep(800);

  // Phase 6: Done state
  statusDot.classList.add('done');
  statusText.textContent = STATUS_MESSAGES.done;
  await sleep(400);
  actions.classList.add('visible');

  // Hold for a couple seconds so GIF captures final state
  await sleep(3000);
}

// Start demo after short delay
setTimeout(runDemo, 500);
</script>
</body>
</html>
